name: Gitclaw Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Deep Debug Agent
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "*"
        run: |
          echo "--- STARTING DEEP DEBUG ---"
          bun lifecycle/main.ts \
            --provider google \
            --model gemini-1.5-flash \
            --verbose \
            --yes \
            --prompt "CRITICAL: You are in debug mode. You MUST execute at least one 'write_file' command. Create a file named 'DEBUG_SUCCESS.txt' with the content 'LOGS CAPTURED'. Explain your actions in detail."
          echo "--- DEBUG RUN FINISHED ---"
