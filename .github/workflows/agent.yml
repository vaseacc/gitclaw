name: Gitclaw Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Direct Agent (Deep Logs)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # We bypass main.ts and call the pi-agent directly
        # This forces the logs to show up in the console
        run: |
          npx @mariozechner/pi-coding-agent \
            --provider google \
            --model gemini-1.5-flash \
            --instructions "Read the issue #${{ github.event.issue.number }} and follow the instructions. You MUST create a file to prove you are working." \
            --yes \
            --verbose
